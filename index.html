#quizExampleBtn {

.quiz-jp { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; }

/ body初期スタイル + ズーム / 
body { 
font-family: -apple-system, sans-serif; 
padding: 20px; 
max-width: 480px; 
margin: auto; 
zoom: 1.3;

#topBar { 
position: sticky; 
top: 0; 
background: #1e1e1e;

padding-bottom: 10px;

h2 { margin-bottom: 15px; } 
.tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; margin-bottom: 10px; } 
.tab-btn {

padding: 10px 0;

border: 1px solid #ccc;

.control-buttons { display: flex; gap: 8px; margin-bottom: 15px; user-select: none; } 
.control-btn { 
cursor: pointer; 
background-color: #eee; 
border: 1px solid #ccc; 
padding: 6px 12px; 
border-radius: 4px; 
font-size: 14px; 
transition: background-color 0.2s; 
} 
.control-btn:hover { background-color: #ddd; } 
.entry { margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; cursor: pointer; user-select: none; } 
.jp { font-size: 18px; color: #333; white-space: pre-line; } 
.details { display: none; margin-top: 6px; color: #555; font-size: 16px; display: flex; gap: 12px; align-items: center; user-select: text; flex-wrap: wrap; } 
.en { font-weight: bold; font-size: 17px; } 
.kana { color: #666; font-size: 15px; } 
.play-btn { 
margin-left: auto; 
cursor: pointer; 
border: none; 
background: transparent; 
font-size: 20px; 
user-select: none; 
color: #007bff; 
transition: color 0.2s;

.play-btn:hover { color: #0056b3; } 
#quizAnswerRow { min-height: 56px; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; } 
#enText, #kanaText { display: none; text-align: center; } 
#enText { font-size: 1.2em; color: #444; cursor: pointer; margin-bottom: 2px; } 
#kanaText { font-size: 1em; color: #666; margin-top: 2px; } 
#showAnswerBtn, #nextBtn { height: 36px; line-height: 36px; min-width: 80px; vertical-align: middle; display: inline-block; margin-right: 8px; cursor: pointer; }


/* 左端初期化ゾーン / 
#leftResetZone { 
position: fixed; 
top: 0; 
left: 0; 
width: 100px; 
height: 100%; 
background: rgba(200,200,200,0.2); / 明るいグレーで少し透過 / 
z-index: 998; 
} 
#exampleModal { 
user-select: none;           / 背景は選択禁止 / 
-webkit-user-select: none; 
-ms-user-select: none; 
-moz-user-select: none;

}

color: #e0e0e0;

user-select: none;

  function playSound(word) {

    const url = `https://ssl.gstatic.com/dictionary/static/sounds/20200429/${clean}--_us_1.mp3`;
    const audio = new Audio(url);

    audio.onerror = () => {
      playTTS(clean); // fallback
    };

    audio.play().catch(() => {
      playTTS(clean);
    });

  } else {
    // TTS
    playTTS(clean);
  }
}

// ← TTS部分を関数に分離（今のコードそのまま）
function playTTS(word) {
  speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang = "en-US") || voices[0];

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.voice = voice;
  utterance.lang = "en-US";
  utterance.rate = 0.9;
  utterance.pitch = 1.1;

  speechSynthesis.speak(utterance);
}

  function shuffleArray(arr) {
    const a = arr.slice();
    for(let i = a.length -1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

        currentQuizIndex,

        wrongQuizList,

function resumeQuiz() {
    const saved = localStorage.getItem("savedQuiz");
    if(!saved) return;
    const state = JSON.parse(saved);
    quizDirection = state.quizDirection;
    currentType = state.currentType;
        quizList = state.quizList;
    currentQuizIndex = state.currentQuizIndex;
    stepCounter = state.stepCounter || 0;
    wrongQuizList = state.wrongQuizList || []; 

    // 🔽 保存された値を復元し、プルダウンの見た目も合わせる
    if (state.batchSize) {
      batchSize = state.batchSize;
      document.getElementById("batchSizeSelect").value = batchSize;
    }

    showQuizQuestion();

    quizOverlay.style.display = "flex";
    resumeQuizBtn.style.display = "none";
}

// 長押し開始（0.8秒後にリセット確認）
function startResumePress() {
    resumePressTimer = setTimeout(() => {
        if (confirm("【警告】進行中のクイズデータを完全に破棄しますか？")) {
            localStorage.removeItem("savedQuiz");
            resumeQuizBtn.style.display = "none";
            // alertは削除しました
        }
    }, 800);
}

// タイマー解除
function cancelResumePress() {
    clearTimeout(resumePressTimer);
}

// 短押しで再開
resumeQuizBtn.addEventListener("click", () => {
    resumeQuiz();
});

// PC操作用
resumeQuizBtn.addEventListener("mousedown", startResumePress);
resumeQuizBtn.addEventListener("mouseup", cancelResumePress);
resumeQuizBtn.addEventListener("mouseleave", cancelResumePress);

// スマホ操作用
resumeQuizBtn.addEventListener("touchstart", (e) => {
    startResumePress();
});
resumeQuizBtn.addEventListener("touchend", cancelResumePress);
resumeQuizBtn.addEventListener("touchcancel", cancelResumePress);



window.addEventListener("load", () => {
    const saved = localStorage.getItem("savedQuiz");
    if (saved) resumeQuizBtn.style.display = "inline-block";
});

  searchInput.addEventListener("input", () => {
    const keyword = searchInput.value.trim().toLowerCase();
    if (!keyword) currentList[currentType] = [...(originalData[currentType]||[])];
    else currentList[currentType] = (originalData[currentType]||[]).filter(item => {
      return item.jp.toLowerCase().includes(keyword) ||
             item.en.toLowerCase().includes(keyword) ||
             (item.reading && item.reading.toLowerCase().includes(keyword));
    });
    renderList(currentType);
  });

  renderList(currentType);

  function showWeblioExampleModal(url) {
    const iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    exampleText.innerHTML = "";
    exampleText.appendChild(iframe);
    document.getElementById("exampleModal").style.display = "flex";
  }

  function showCustomExampleModal(textsJp, textsEn, originalJp = "", originalEn = "") {
    lastTapTime = 0; // ← モーダルを開くたびリセット
  let html = "";
  if (originalJp && originalEn) {
    html += `<p style="margin-bottom:4px;"><strong>${originalJp}</strong></p>`;
    html += `<p style="margin-bottom:12px;"><strong>${originalEn}</strong></p>`; // ← hidden-en は削除
    html += `<hr style="border:0; border-top:1px solid #ccc; margin:8px 0;">`;
  }
  for (let i = 0; i < textsJp.length; i) {
    html += `<p style="margin-bottom:2px;">${textsJp[i]}</p>`;
html += `<p style="margin-bottom:12px;">
  <span class="hidden-en" onclick="this.classList.remove('hidden-en');">${textsEn[i]}</span>
  <button onclick="playSound('${textsEn[i]}')" style="margin-left:8px;">▶️</button>
</p>`;
  }
  exampleText.innerHTML = html;
  document.getElementById("exampleModal").style.display = "flex";
}
  
  function closeExampleModal() {
    document.getElementById("exampleText").innerHTML = "";
    document.getElementById("exampleModal").style.display = "none";
  }

  const exampleModalDiv = document.getElementById("exampleModal");
  let pressTimer = null;

// 共通で長押し判定
function startPressTimer() {
  pressTimer = setTimeout(() => {
    closeExampleModal();
  }, 150); // 0.15秒長押しで閉じる
}

function clearPressTimer() {
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
}

// PC: マウス押下
exampleModalDiv.addEventListener("mousedown", (e) => {
  if(e.target = exampleModalDiv) startPressTimer();
});
exampleModalDiv.addEventListener("mouseup", clearPressTimer);
exampleModalDiv.addEventListener("mouseleave", clearPressTimer);

// スマホ: タッチ開始
exampleModalDiv.addEventListener("touchstart", (e) => {
  if(e.target = exampleModalDiv) startPressTimer();
});
exampleModalDiv.addEventListener("touchend", clearPressTimer);
exampleModalDiv.addEventListener("touchcancel", clearPressTimer);

// --- 白い部分のダブルタップ／ダブルクリックで閉じる ---
const exampleWhiteArea = document.getElementById("exampleText");
let lastTapTime = 0;

function handleWhiteAreaTap(e) {
  // クリック／タップが本文やボタンなら何もしない
  if (e.target ! exampleWhiteArea) return;

  const currentTime = new Date().getTime();
  if (currentTime - lastTapTime < 300) {
    closeExampleModal();
  }
  lastTapTime = currentTime;
}

// PC: クリック
exampleWhiteArea.addEventListener("click", handleWhiteAreaTap);
// スマホ: タップ
exampleWhiteArea.addEventListener("touchend", handleWhiteAreaTap);

// hidden-en をタップしたときはイベントを親に伝えない
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("hidden-en")) {
    e.stopPropagation();
  }
});

document.addEventListener("touchend", (e) => {
  if (e.target.classList.contains("hidden-en")) {
    e.stopPropagation();
  }
});

  // --- 新規：左端長押しで初期化 ---
  let leftPressTimer;
  leftResetZone.addEventListener("touchstart", (e) => {
    leftPressTimer = setTimeout(() => {
      // 初期状態に戻す
      for (let type in currentList) {
        currentList[type] = [...(originalData[type] || [])];
      }
      currentType = "verbs";
      setActiveTab("verbs");
      renderList(currentType);
      searchInput.value = "";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 300); // 0.3秒長押し
  });

  leftResetZone.addEventListener("touchend", () => { clearTimeout(leftPressTimer); });
  leftResetZone.addEventListener("touchcancel", () => { clearTimeout(leftPressTimer); });

  // --- PC用：マウス短押しで初期化 ---
leftResetZone.addEventListener("mousedown", (e) => {
  leftPressTimer = setTimeout(() => {
    // 初期化処理
    for (let type in currentList) {
      currentList[type] = [...(originalData[type] || [])];
    }
    currentType = "verbs";
    setActiveTab("verbs");
    renderList(currentType);
    searchInput.value = "";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 150);
});
leftResetZone.addEventListener("mouseup", () => { clearTimeout(leftPressTimer); });
leftResetZone.addEventListener("mouseleave", () => { clearTimeout(leftPressTimer); });

});

document.querySelectorAll(".hidden-en").forEach(el => {
  el.addEventListener("click", () => {
    el.classList.add("revealed");
  });
});

window.playSound = playSound;

</script>


</body>
