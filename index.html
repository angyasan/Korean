<title>単語帳</title>
<style>
  /* 既存スタイルそのまま */
  #quizOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  #quizContainer {
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  #quizContainer {
  position: relative; /* 絶対配置の基準にする */
}


#quizExampleBtn { 
position: absolute; 
bottom: 10px;   /* 下からの距離 / 
left: 10px;     / 左からの距離 / 
z-index: 1001;  / クイズ要素の上に表示 / 
} 
.hidden { display: none !important; } 
.quiz-jp { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; } 
.quiz-en { font-size: 1.2em; color: #444; margin-bottom: 5px; cursor: pointer; } 
.quiz-kana { font-size: 1em; color: #666; margin-top: 2px; } 
/ body初期スタイル + ズーム / 
body { 
font-family: -apple-system, sans-serif; 
padding: 20px; 
max-width: 480px; 
margin: auto; 
zoom: 1.3; 
}/ ここ追加 */

#topBar { 
position: sticky; 
top: 0; 
background: #1e1e1e; 
z-index: 1000; 
padding-bottom: 10px; 
box-shadow: 0 2px 8px rgba(0,0,0,0.5); 
}


h2 { margin-bottom: 15px; } 
.tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; margin-bottom: 10px; } 
.tab-btn { 
flex: 1 0 auto; 
min-width: 100px; 
padding: 10px 0; 
cursor: pointer; 
border: 1px solid #ccc; 
background: #f9f9f9; 
text-align: center; 
font-weight: bold; 
user-select: none; 
transition: background-color 0.3s; 
white-space: nowrap; 
} 
.tab-btn.active { background-color: #007bff; color: white; border-color: #007bff; } 
.control-buttons { display: flex; gap: 8px; margin-bottom: 15px; user-select: none; } 
.control-btn { 
cursor: pointer; 
background-color: #eee; 
border: 1px solid #ccc; 
padding: 6px 12px; 
border-radius: 4px; 
font-size: 14px; 
transition: background-color 0.2s; 
} 
.control-btn:hover { background-color: #ddd; } 
.entry { margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; cursor: pointer; user-select: none; } 
.jp { font-size: 18px; color: #333; white-space: pre-line; } 
.details { display: none; margin-top: 6px; color: #555; font-size: 16px; display: flex; gap: 12px; align-items: center; user-select: text; flex-wrap: wrap; } 
.en { font-weight: bold; font-size: 17px; } 
.kana { color: #666; font-size: 15px; } 
.play-btn { 
margin-left: auto; 
cursor: pointer; 
border: none; 
background: transparent; 
font-size: 20px; 
user-select: none; 
color: #007bff; 
transition: color 0.2s; 
} 
.play-btn:hover { color: #0056b3; } 
#quizAnswerRow { min-height: 56px; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; } 
#enText, #kanaText { display: none; text-align: center; } 
#enText { font-size: 1.2em; color: #444; cursor: pointer; margin-bottom: 2px; } 
#kanaText { font-size: 1em; color: #666; margin-top: 2px; } 
#showAnswerBtn, #nextBtn { height: 36px; line-height: 36px; min-width: 80px; vertical-align: middle; display: inline-block; margin-right: 8px; cursor: pointer; }


/* 左端初期化ゾーン / 
#leftResetZone { 
position: fixed; 
top: 0; 
left: 0; 
width: 100px; 
height: 100%; 
background: rgba(200,200,200,0.2); / 明るいグレーで少し透過 / 
z-index: 998; 
} 
#exampleModal { 
user-select: none;           / 背景は選択禁止 / 
-webkit-user-select: none; 
-ms-user-select: none; 
-moz-user-select: none; 
touch-action: manipulation;  / 長押しでコピー出ないように */ 
}


/* 例文モーダル内テキスト用 
/#exampleText { 
padding: 16px; 
overflow-y: auto; 
flex: 1; 
font-size: 16px; 
user-select: text !important; 
-webkit-user-select: text !important; 
-ms-user-select: text !important; 
-moz-user-select: text !important; 
color: #000000; / 黒文字にする */ 
}

body { 
background-color: #1e1e1e;  /* 暗めグレー / 
color: #e0e0e0;             / 文字を明るめグレー */ 
}

.entry .jp, 
.entry .details, 
.details .en, 
.details .kana { 
color: #e0e0e0; 
} 
.control-btn, .play-btn, #scrollTopBtn, #scrollBottomBtn { 
color: #00bfff; 
border-color: #00bfff; 
background-color: transparent; 
}

.tabs .tab-btn { 
color: #e0e0e0; 
border-color: #444; 
background: #2a2a2a; 
}

.tabs .tab-btn.active { 
background-color: #007bff; 
color: #fff; 
}

/* ← ここを追加：クイズ画面の日本語は黒文字に / 
#jpText { 
color: #000000;  / 黒文字 */ 
font-weight: bold; 
}

.hidden-en { 
color: transparent;         /* 文字を透明に / 
background-color: #333;     / 背景を黒っぽく */ 
border-radius: 3px; 
padding: 2px 4px; 
cursor: pointer; 
user-select: none; 
transition: color 0.3s ease; 
}

.hidden-en.revealed { 
color: #000;                /* 表示時は黒文字に / 
background-color: transparent; / 背景は戻す */ 
} 
</style>

// ← TTS部分を関数に分離（今のコードそのまま）
function playTTS(word) {
  speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang = "en-US") || voices[0];

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.voice = voice;
  utterance.lang = "en-US";
  utterance.rate = 0.9;
  utterance.pitch = 1.1;

  speechSynthesis.speak(utterance);
}

// 共通関数にしてコード重複回避（追加）
function startQuiz(type){
  // ✅ 保存データがあるかチェックして確認を出す
  const saved = localStorage.getItem("savedQuiz");
  if (saved) {
    try {
      const state = JSON.parse(saved);
      
      // 保存データから「項目名」を日本語に変換
      const typeNames = {
        others: "その他", various: "色々", verbs: "動詞", nouns: "名詞",
        adverbs: "副詞", adjectives: "形容詞", tenses: "時制",
        pronouns: "代名詞", prepositions: "前置詞", conjunctions: "接続詞", nsfw: "ダメー"
      };
      
      const savedTypeName = typeNames[state.currentType] || state.currentType;
      const savedDirection = state.quizDirection || "不明";

      // ポップアップのメッセージ作成
      const message = `【中断データがあります】\n\n` +
                      `進行中：${savedTypeName} (${savedDirection} クイズ)\n\n` +
                      `このデータを破棄して新しく始めますか？\n` +
                      `（キャンセルで元のクイズを再開できます）`;

      if (!confirm(message)) {
        return; // キャンセルなら何もしない
      }
    } catch (e) {
      console.error("保存データの解析に失敗しました", e);
    }
  }

  // --- 以下、新しく始めるための初期化 ---
  quizList = shuffleArray([...currentList[type]]);
  currentQuizIndex = 0;
  
  // 復習関連の状態もリセット
  isReviewMode = false;
  currentBatchWrong = [];
  reviewWrongList = [];
  stepCounter = 0;

  

  if (quizList.length = 0) { alert("問題がありません"); return; }
  
  // 新しく始めるので、古い保存を一度クリアして最新の状態に
  localStorage.removeItem("savedQuiz");
  autoSaveQuizState(); 

    showQuizQuestion();
  quizOverlay.style.display = "flex";
  
  // 🔽 ここに追加（ロックを解除して明るくする）
  const bSelect = document.getElementById("batchSizeSelect");
  bSelect.disabled = false;
  bSelect.style.background = "#f9f9f9";

  // 新しく始めたので「再開」ボタンは隠す

  resumeQuizBtn.style.display = "none";
}

prevBtn.addEventListener("click", () => {

} else {

}
});
nextBtn.addEventListener("click", () => {
  if (isReviewMode) {
    const currentItem = reviewList[reviewIndex];
    const indexInReviewWrong = reviewWrongList.indexOf(currentItem);
    if (indexInReviewWrong > -1) reviewWrongList.splice(indexInReviewWrong, 1);
    reviewIndex;
    if (reviewIndex >= reviewList.length) {
      if (reviewWrongList.length > 0) {
        document.getElementById("reReviewNotice").style.display = "flex";
        document.getElementById("startReReviewConfirm").onclick = () => {
          document.getElementById("reReviewNotice").style.display = "none";
          reviewList = shuffleArray([...reviewWrongList]);
          reviewWrongList = [];
          reviewIndex = 0;
          showReviewQuestion();
        };
      } else {
        isReviewMode = false;
        document.getElementById("reviewFinishNotice").style.display = "flex";
        document.getElementById("finishReviewConfirm").onclick = () => {
          document.getElementById("reviewFinishNotice").style.display = "none";
          currentQuizIndex;
          if (currentQuizIndex >= quizList.length) { finishQuiz(); } 
          else { showQuizQuestion(); document.getElementById("batchSizeSelect").disabled = false; }
        };
      }
      return;
    }
    showReviewQuestion();
    return;
  }

  if (quizList[currentQuizIndex]) {
    const currentItem = quizList[currentQuizIndex];
    const idxW = wrongQuizList.indexOf(currentItem);
    if (idxW > -1) wrongQuizList.splice(idxW, 1);
    const idxB = currentBatchWrong.indexOf(currentItem);
    if (idxB > -1) currentBatchWrong.splice(idxB, 1);
  }

  if ((currentQuizIndex + 1) % batchSize = 0 && currentBatchWrong.length > 0) {
    startBatchReview();
    return;
  }

  currentQuizIndex;
  autoSaveQuizState();
  if (currentQuizIndex >= quizList.length) { finishQuiz(); } 
  else { nextBtn.style.display = "none"; wrongBtn.style.display = "none"; showQuizQuestion(); }
});







wrongBtn.addEventListener("click", () => {
  const bSelect = document.getElementById("batchSizeSelect");
  bSelect.disabled = true;
  
  if (isReviewMode) {
    const currentItem = reviewList[reviewIndex];
    if (!reviewWrongList.includes(currentItem)) reviewWrongList.push(currentItem);
    reviewIndex;
    if (reviewIndex >= reviewList.length) {
      document.getElementById("reReviewNotice").style.display = "flex";
      document.getElementById("startReReviewConfirm").onclick = () => {
        document.getElementById("reReviewNotice").style.display = "none";
        reviewList = shuffleArray([...reviewWrongList]);
        reviewWrongList = [];
        reviewIndex = 0;
        showReviewQuestion();
      };
      return;
    }
    showReviewQuestion();
    return;
  }

  const currentItem = quizList[currentQuizIndex];
  if (!currentBatchWrong.includes(currentItem)) currentBatchWrong.push(currentItem);
  if (!wrongQuizList.includes(currentItem)) wrongQuizList.push(currentItem);

  if ((currentQuizIndex + 1) % batchSize = 0 && currentBatchWrong.length > 0) {
    startBatchReview();
    return;
  }

  currentQuizIndex;
  autoSaveQuizState();
  if (currentQuizIndex >= quizList.length) { finishQuiz(); } 
  else { wrongBtn.style.display = "none"; nextBtn.style.display = "none"; showQuizQuestion(); }
});

function startBatchReview() {

// クイズが最後まで到達した時の処理をする関数
function finishQuiz() {
    if (wrongQuizList.length > 0) {
        quizList = shuffleArray([...wrongQuizList]);
        wrongQuizList = [];
        currentQuizIndex = 0;
        alert("不正解だけもう一回！");
        showQuizQuestion();
    } else {
        alert("全問終了！");
        quizOverlay.style.display = "none";
        localStorage.removeItem("savedQuiz");
    }
}

// 状態を保存する関数（stepCounterを削除し整理したもの）
function autoSaveQuizState() {
    if(!quizList || quizList.length = 0) return;
    const state = {
        quizDirection,
        currentType,
        currentQuizIndex,
        quizList,
        wrongQuizList,
        batchSize
    };
    localStorage.setItem("savedQuiz", JSON.stringify(state));
}
