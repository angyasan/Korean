  function playSound(word) {

  
  console.log("再生:", word);
  
  const clean = word.trim().toLowerCase();

  if (voiceMode = "dictionary") {
    // 辞書音声
    const url = `https://ssl.gstatic.com/dictionary/static/sounds/20200429/${clean}--_us_1.mp3`;
    const audio = new Audio(url);

    audio.onerror = () => {
      playTTS(clean); // fallback
    };

    audio.play().catch(() => {
      playTTS(clean);
    });

  } else {
    // TTS
    playTTS(clean);
  }

// ← TTS部分を関数に分離（今のコードそのまま）
function playTTS(word) {
  speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang = "en-US") || voices[0];

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.voice = voice;
  utterance.lang = "en-US";
  utterance.rate = 0.9;
  utterance.pitch = 1.1;

  speechSynthesis.speak(utterance);
}

  function shuffleArray(arr) {
    const a = arr.slice();
    for(let i = a.length -1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

// 共通関数にしてコード重複回避（追加）
// 共通関数にしてコード重複回避（追加）
function startQuiz(type){
  // ✅ 保存データがあるかチェックして確認を出す
  const saved = localStorage.getItem("savedQuiz");
  if (saved) {
    try {
      const state = JSON.parse(saved);
      
      // 保存データから「項目名」を日本語に変換
      const typeNames = {
        others: "その他", various: "色々", verbs: "動詞", nouns: "名詞",
        adverbs: "副詞", adjectives: "形容詞", tenses: "時制",
        pronouns: "代名詞", prepositions: "前置詞", conjunctions: "接続詞", nsfw: "ダメー"
      };
      
      const savedTypeName = typeNames[state.currentType] || state.currentType;
      const savedDirection = state.quizDirection || "不明";

      // ポップアップのメッセージ作成
      const message = `【中断データがあります】\n\n` +
                      `進行中：${savedTypeName} (${savedDirection} クイズ)\n\n` +
                      `このデータを破棄して新しく始めますか？\n` +
                      `（キャンセルで元のクイズを再開できます）`;

      if (!confirm(message)) {
        return; // キャンセルなら何もしない
      }
    } catch (e) {
      console.error("保存データの解析に失敗しました", e);
    }
  }

  // --- 以下、新しく始めるための初期化 ---
  quizList = shuffleArray([...currentList[type]]);
  currentQuizIndex = 0;
  
  // 復習関連の状態もリセット
  isReviewMode = false;
  currentBatchWrong = [];
  reviewWrongList = [];
  stepCounter = 0;

  

  if (quizList.length = 0) { alert("問題がありません"); return; }
  
  // 新しく始めるので、古い保存を一度クリアして最新の状態に
  localStorage.removeItem("savedQuiz");
  autoSaveQuizState(); 

    showQuizQuestion();
  quizOverlay.style.display = "flex";
  
  // 🔽 ここに追加（ロックを解除して明るくする）
  const bSelect = document.getElementById("batchSizeSelect");
  bSelect.disabled = false;
  bSelect.style.background = "#f9f9f9";

  // 新しく始めたので「再開」ボタンは隠す

  resumeQuizBtn.style.display = "none";
}





// --- 前へボタン処理（修正版） ---
prevBtn.addEventListener("click", () => {
    if (isReviewMode) {
        // 復習モード中なら、復習のインデックスを戻す
        if (reviewIndex > 0) {
            reviewIndex--;
            showReviewQuestion();
        }
    } else {
        // 通常モードなら、元の問題のインデックスを戻す
        if (currentQuizIndex > 0) {

            autoSaveQuizState();
        }
    }

showAnswerBtn.addEventListener("click", () => {

                showAnswerBtn.style.display = "none";

    wrongBtn.style.display = "inline-block";

} else {
    enText.onclick = () => playSound(quizList[currentQuizIndex].en);
    jpText.onclick = null;
}
});
nextBtn.addEventListener("click", () => {
  if (isReviewMode) {
    const currentItem = reviewList[reviewIndex];
    const indexInReviewWrong = reviewWrongList.indexOf(currentItem);
    if (indexInReviewWrong > -1) reviewWrongList.splice(indexInReviewWrong, 1);
    reviewIndex;
    if (reviewIndex >= reviewList.length) {
      if (reviewWrongList.length > 0) {
        document.getElementById("reReviewNotice").style.display = "flex";
        document.getElementById("startReReviewConfirm").onclick = () => {
          document.getElementById("reReviewNotice").style.display = "none";
          reviewList = shuffleArray([...reviewWrongList]);
          reviewWrongList = [];
          reviewIndex = 0;
          showReviewQuestion();
        };
      } else {
        isReviewMode = false;
        document.getElementById("reviewFinishNotice").style.display = "flex";
        document.getElementById("finishReviewConfirm").onclick = () => {
          document.getElementById("reviewFinishNotice").style.display = "none";
          currentQuizIndex;
          if (currentQuizIndex >= quizList.length) { finishQuiz(); } 
          else { showQuizQuestion(); document.getElementById("batchSizeSelect").disabled = false; }
        };
      }
      return;
    }
    showReviewQuestion();
    return;
  }

  if (quizList[currentQuizIndex]) {
    const currentItem = quizList[currentQuizIndex];
    const idxW = wrongQuizList.indexOf(currentItem);
    if (idxW > -1) wrongQuizList.splice(idxW, 1);
    const idxB = currentBatchWrong.indexOf(currentItem);
    if (idxB > -1) currentBatchWrong.splice(idxB, 1);
  }

  if ((currentQuizIndex + 1) % batchSize = 0 && currentBatchWrong.length > 0) {
    startBatchReview();
    return;
  }

  currentQuizIndex;
  autoSaveQuizState();
  if (currentQuizIndex >= quizList.length) { finishQuiz(); } 
  else { nextBtn.style.display = "none"; wrongBtn.style.display = "none"; showQuizQuestion(); }
});







wrongBtn.addEventListener("click", () => {
  const bSelect = document.getElementById("batchSizeSelect");
  bSelect.disabled = true;
  
  if (isReviewMode) {
    const currentItem = reviewList[reviewIndex];
    if (!reviewWrongList.includes(currentItem)) reviewWrongList.push(currentItem);
    reviewIndex;
    if (reviewIndex >= reviewList.length) {
      document.getElementById("reReviewNotice").style.display = "flex";
      document.getElementById("startReReviewConfirm").onclick = () => {
        document.getElementById("reReviewNotice").style.display = "none";
        reviewList = shuffleArray([...reviewWrongList]);
        reviewWrongList = [];
        reviewIndex = 0;
        showReviewQuestion();
      };
      return;
    }
    showReviewQuestion();
    return;
  }

  const currentItem = quizList[currentQuizIndex];
  if (!currentBatchWrong.includes(currentItem)) currentBatchWrong.push(currentItem);
  if (!wrongQuizList.includes(currentItem)) wrongQuizList.push(currentItem);

  if ((currentQuizIndex + 1) % batchSize = 0 && currentBatchWrong.length > 0) {
    startBatchReview();
    return;
  }

  currentQuizIndex;
  autoSaveQuizState();
  if (currentQuizIndex >= quizList.length) { finishQuiz(); } 
  else { wrongBtn.style.display = "none"; nextBtn.style.display = "none"; showQuizQuestion(); }
});

// 復習モードを起動する関数
function startBatchReview() {
    reviewList = shuffleArray([...currentBatchWrong]);

    reviewWrongList = []; 
    isReviewMode = true;
    reviewIndex = 0;
    const notice = document.getElementById("reviewNotice");
    notice.style.display = "flex";

        notice.style.display = "none";

    nextBtn.style.display = "none";

// クイズが最後まで到達した時の処理をする関数
function finishQuiz() {
    if (wrongQuizList.length > 0) {
        quizList = shuffleArray([...wrongQuizList]);
        wrongQuizList = [];
        currentQuizIndex = 0;
        alert("不正解だけもう一回！");
        showQuizQuestion();
    } else {
        alert("全問終了！");
        quizOverlay.style.display = "none";
        localStorage.removeItem("savedQuiz");
    }
}

// 状態を保存する関数（stepCounterを削除し整理したもの）
function autoSaveQuizState() {
    if(!quizList || quizList.length = 0) return;
    const state = {
        quizDirection,
        currentType,
        currentQuizIndex,
        quizList,
        wrongQuizList,
        batchSize
    };
    localStorage.setItem("savedQuiz", JSON.stringify(state));
}

    currentType = state.currentType;
        quizList = state.quizList;

    stepCounter = state.stepCounter || 0;
    wrongQuizList = state.wrongQuizList || [];
