<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>韓国語単語帳</title>

<style>
body {
  font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
  background:#1e1e1e;
  color:#eee;
  padding:24px;
  max-width:700px;
  margin:auto;
  font-size: 18px;
}

h2 { text-align:center; }

.tab {
  display:flex;
  overflow-x:auto;
  gap:6px;
  margin-bottom:10px;
}

.tab button {
  flex:1;
  padding:8px;
  border:none;
  background:#333;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.tab button.active {
  background:#007bff;
}

.word {
  background:#2a2a2a;
  padding:18px;
  margin-bottom:14px;
  border-radius:10px;
  cursor:pointer;
}

.ko {
  display:none;
  margin-top:6px;
  color:#fff;
}

.jp {
  font-weight:bold;
}

.kana {
  font-size:16px;
  color:#eee;
}

.btn {
  margin-left:12px;
  cursor:pointer;
  background:none;
  border:2px solid #888;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  font-size:20px;
}
</style>
</head>

<body>

<h2>📘 韓国語単語帳</h2>

<div class="tab">
  <button class="active" onclick="setTab('common')">よく使う</button>
  <button onclick="setTab('phrase')">フレーズ</button>
  <button onclick="setTab('verb')">動詞</button>
  <button onclick="setTab('noun')">名詞</button>
  <button onclick="setTab('adj')">形容詞</button>
  <button onclick="setTab('adv')">副詞</button>
</div>

<div id="list"></div>

<script>

const data = {
  common: [
    {jp:"こんにちは", ko:"안녕하세요", kana:"アンニョンハセヨ"},
    {jp:"ありがとう", ko:"감사합니다", kana:"カムサハムニダ"},
    {jp:"はい", ko:"네", kana:"ネ"},
    {jp:"いいえ", ko:"아니요", kana:"アニヨ"},
  ],
  phrase: [
    {jp:"元気ですか？", ko:"잘 지내요?", kana:"チャル チネヨ"},
    {jp:"助けてください", ko:"도와주세요", kana:"トワジュセヨ"},
  ],
  verb: [
    {jp:"行く", ko:"가다", kana:"カダ"},
    {jp:"食べる", ko:"먹다", kana:"モッタ"},
    {jp:"見る", ko:"보다", kana:"ポダ"},
  ],
  noun: [
    {jp:"学校", ko:"학교", kana:"ハッキョ"},
    {jp:"本", ko:"책", kana:"チェク"},
  ],
  adj: [
    {jp:"大きい", ko:"크다", kana:"クダ"},
    {jp:"小さい", ko:"작다", kana:"チャッタ"},
  ],
  adv: [
    {jp:"ゆっくり", ko:"천천히", kana:"チョンチョニ"},
    {jp:"早く", ko:"빨리", kana:"ッパリ"},
  ]
};

let current = "common";

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data[current].forEach(item => {
    const div = document.createElement("div");
    div.className = "word";

    div.innerHTML = `
      <div class="jp">${item.jp}</div>
      <div class="ko">
        ${item.ko}
        <span class="kana">${item.kana}</span>
<button class="btn" onclick="event.stopPropagation(); speak('${item.ko}')">▶️</button>
      </div>
    `;

    div.addEventListener("click", () => {
      const ko = div.querySelector(".ko");
      ko.style.display = ko.style.display === "block" ? "none" : "block";
    });

    list.appendChild(div);
  });
}

function setTab(tab) {
  current = tab;
  document.querySelectorAll(".tab button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ko-KR";
  speechSynthesis.speak(u);
}

render();

</script>

</body>
</html>
